name: update-baselines

# Temporary helper: regenerate Playwright visual baselines on the same
# ubuntu-latest runner the qa job uses, so they byte-match CI font rendering.
# Run via the Actions tab (workflow_dispatch); download the "baselines"
# artifact and commit it. Safe to delete after baselines are in sync.

on:
  push:
    branches:
      - redesign/engineering-console

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --update-snapshots
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: baselines
          path: tests/acceptance/design-baseline.spec.ts-snapshots/
          if-no-files-found: error
