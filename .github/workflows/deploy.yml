name: deploy

on:
  workflow_run:
    workflows:
      - qa
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pages:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || 'main' }}
          submodules: true
          fetch-depth: 0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
          include-hidden-files: true
      - uses: actions/deploy-pages@v5
        id: deployment

  virustotal:
    needs: pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || 'main' }}
      - uses: ./.github/actions/virustotal-url-check
        with:
          api-key: ${{ secrets.VIRUSTOTAL_APIKEY }}
          url: https://ever-guild.net/
          reanalyze: "true"
          wait-seconds: "90"
          fail-on-detection: "true"
