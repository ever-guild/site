<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="description" content="The page you are looking for could not be found on Ever Guild." />
    <meta name="theme-color" content="#001D25" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Page not found | Ever Guild</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #001d25;
        --gold: #f1b800;
        --gold-soft: rgba(241, 184, 0, 0.18);
        --text: #f4efe2;
        --muted: rgba(244, 239, 226, 0.66);
        --line: rgba(241, 184, 0, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 40px, 680px);
        padding: 56px 0;
      }

      img {
        width: 96px;
        height: 96px;
      }

      p {
        margin: 0;
      }

      .code {
        margin-top: 32px;
        color: var(--gold);
        font-family: ui-monospace, "SFMono-Regular", monospace;
        font-size: 0.86rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 560px;
        margin: 16px 0;
        font-size: clamp(2.5rem, 8vw, 5.5rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .copy {
        max-width: 460px;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        margin-top: 32px;
        padding: 0 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--gold-soft);
        color: var(--text);
        font-weight: 700;
        text-decoration: none;
      }

      a:focus-visible,
      a:hover {
        border-color: var(--gold);
        outline: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/favicon.png" alt="Ever Guild" width="96" height="96" />
      <p class="code">404 / Not found</p>
      <h1>This page is outside the guild map</h1>
      <p class="copy">The address may be outdated, moved, or mistyped. Return to the main Ever Guild site.</p>
      <a href="/">Back to Ever Guild</a>
    </main>
  </body>
</html>
